# Render Blueprint — tek tıkla deploy (Render → New → Blueprint → bu repo)
# Web servisi + yönetilen PostgreSQL. İletişim formları kalıcı DB'de.
services:
  - type: web
    name: sagirhukuk
    runtime: node
    plan: free
    buildCommand: npm install && npm run db:setup && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: sagirhukuk-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: NOTIFY_TO
        sync: false
      - key: KVKK_CONTACT_EMAIL
        sync: false
      - key: DATA_RETENTION_MONTHS
        value: "24"
      - key: GSC_VERIFICATION
        sync: false
      - key: SMTP_PORT
        value: "465"

databases:
  - name: sagirhukuk-db
    plan: free
    databaseName: sagirhukuk
