# Render Blueprint — sagirhukuk.net web servisi
# PostgreSQL: me-package ile ayni Render Postgres (mepackage-db), ayri database adi: sagirhukuk
# Render ucretsiz planda hesap basina 1 Postgres limiti var; ikinci DB kaynagi olusturulmaz.
# Once mepackage-db uzerinde CREATE DATABASE sagirhukuk; DATABASE_URL'i Environment'a yapistirin.
services:
  - type: web
    name: sagirhukuk
    runtime: node
    plan: free
    buildCommand: npm install && npm run db:setup && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: NOTIFY_TO
        sync: false
      - key: KVKK_CONTACT_EMAIL
        sync: false
      - key: DATA_RETENTION_MONTHS
        value: "24"
      - key: GSC_VERIFICATION
        sync: false
      - key: SMTP_PORT
        value: "465"
